# Template: Release (GitHub Container Registry)
#
# Complete release workflow to GitHub Container Registry (ghcr.io)
# Includes: Docker build/push and Helm chart packaging
#
# Usage:
#   1. Copy this file to your project's .github/workflows/release.yml
#   2. Configure GITHUB_TOKEN permissions (packages:write)
#   3. Images will be pushed to ghcr.io/<owner>/<image>

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Build and Push Docker Images
    uses: mandacode-lab/workflows/.github/workflows/docker-build.yml@main
    with:
      # Images to build (REQUIRED)
      images: |
        [
          {"name": "myapp", "dockerfile": "Dockerfile"}
        ]
      # Multiple images example:
      # images: |
      #   [
      #     {"name": "api", "dockerfile": "Dockerfile"},
      #     {"name": "worker", "dockerfile": "services/worker/Dockerfile"}
      #   ]

      # Registry configuration (REQUIRED for GitHub)
      registry: "ghcr.io"
      repository: ${{ github.repository }}

      # Tagging
      tag: ${{ github.ref_name }}
      tag-prefix: "v"
      # additional-tags: "latest,stable"

      # Build options
      # base-path: ""
      # build-context: "."
      platforms: "linux/amd64"
      # platforms: "linux/amd64,linux/arm64"

      # Build arguments
      # build-args: |
      #   VERSION=${{ github.ref_name }}
      #   GIT_COMMIT=${{ github.sha }}

      # Security attestations
      enable-provenance: false
      enable-sbom: false

    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # Delete this job if you don't use Helm charts
  helm-package:
    name: Package and Push Helm Charts
    needs: docker-build
    uses: mandacode-lab/workflows/.github/workflows/helm-package.yml@main
    with:
      # Charts to package (REQUIRED)
      charts: |
        [
          {"dir": "charts/myapp"}
        ]

      # Registry configuration (REQUIRED)
      registry: ${{ vars.REGISTRY }}
      repository: ${{ vars.REPOSITORY }}

      # Options
      # base-path: ""
      # helm-version: "v4.0.4"
      skip-existing: true

      # Security
      enable-signing: false
      enable-provenance: false

    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
      # GPG signing secrets (only if enable-signing: true)
      # gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      # gpg-key-name: ${{ secrets.GPG_KEY_NAME }}
      # gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
