# Template: Release (AWS ECR)
#
# Complete release workflow to AWS ECR
# Includes: Docker build/push to ECR and Helm chart packaging to ECR
#
# Usage:
#   1. Copy this file to your project's .github/workflows/release.yml
#   2. Configure AWS OIDC or add AWS credentials as secrets
#   3. Update AWS region and repository prefix
#
# AWS Authentication:
#   Option 1 (Recommended): OIDC with IAM Role
#     - Create IAM role with trust policy for GitHub OIDC
#     - Set aws-role-arn secret
#   Option 2: Access Keys
#     - Set aws-access-key-id and aws-secret-access-key secrets

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  docker-build-ecr:
    name: Build and Push Docker Images to ECR
    uses: mandacode-lab/workflows/.github/workflows/docker-build-ecr.yml@main
    with:
      # Images to build (REQUIRED)
      images: |
        [
          {"name": "myapp", "dockerfile": "Dockerfile"}
        ]
      # Multiple images example:
      # images: |
      #   [
      #     {"name": "api", "dockerfile": "Dockerfile"},
      #     {"name": "worker", "dockerfile": "services/worker/Dockerfile"}
      #   ]

      # AWS configuration (REQUIRED)
      aws-region: ap-northeast-2
      # ecr-registry: ""  # Auto-detected from credentials
      ecr-repository-prefix: mycompany

      # Tagging
      tag: ${{ github.ref_name }}
      tag-prefix: "v"
      # additional-tags: "latest"

      # Build options
      # base-path: ""
      # build-context: "."
      platforms: "linux/amd64"
      # platforms: "linux/amd64,linux/arm64"

      # Build arguments
      # build-args: |
      #   VERSION=${{ github.ref_name }}
      #   GIT_COMMIT=${{ github.sha }}

      # Security attestations
      enable-provenance: false
      enable-sbom: false

      # Repository management
      create-repository: true

    secrets:
      # Option 1: OIDC (Recommended)
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}

      # Option 2: Access Keys
      # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # Delete this job if you don't use Helm charts
  helm-package-ecr:
    name: Package and Push Helm Charts to ECR
    needs: docker-build-ecr
    uses: mandacode-lab/workflows/.github/workflows/helm-package-ecr.yml@main
    with:
      # Charts to package (REQUIRED)
      charts: |
        [
          {"dir": "charts/myapp"}
        ]

      # AWS configuration (REQUIRED)
      aws-region: ap-northeast-2
      # ecr-registry: ""  # Auto-detected
      ecr-repository-prefix: helm

      # Options
      # base-path: ""
      # helm-version: "v4.0.4"
      skip-existing: true
      create-repository: true
      enable-signing: false

    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
      # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      # gpg-key-name: ${{ secrets.GPG_KEY_NAME }}
      # gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
