name: Docker Test

# Reusable workflow for testing Dockerfiles
# Tests include: linting (Hadolint), security scanning (Trivy), and build verification
#
# Usage example:
#   jobs:
#     docker-test:
#       uses: your-org/workflows/.gitea/workflows/docker-test.yml@main
#       with:
#         images: '[{"dockerfile": "Dockerfile"}, {"dockerfile": "Dockerfile.alpine"}]'
#         base-path: "build/docker"

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image configurations [{"dockerfile": "path/to/Dockerfile"}]'
        required: true
        type: string
      base-path:
        description: "Base path prepended to dockerfile paths"
        required: false
        type: string
        default: ""
      build-context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      platforms:
        description: "Target platforms (comma-separated, e.g., linux/amd64,linux/arm64)"
        required: false
        type: string
        default: "linux/amd64"
      test-build-only:
        description: "Only test if Dockerfile builds (skip running container)"
        required: false
        type: boolean
        default: true
      enable-hadolint:
        description: "Enable Hadolint linting"
        required: false
        type: boolean
        default: true
      hadolint-version:
        description: "Hadolint version"
        required: false
        type: string
        default: "v2.14.0"
      enable-trivy:
        description: "Enable Trivy security scan"
        required: false
        type: boolean
        default: true
      trivy-severity:
        description: "Minimum severity for Trivy (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)"
        required: false
        type: string
        default: "MEDIUM,HIGH,CRITICAL"

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test ${{ matrix.image.dockerfile }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: fromJson(inputs.images) != null && fromJson(inputs.images)[0] != null
    strategy:
      matrix:
        image: ${{ fromJson(inputs.images) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Dockerfile path
        id: paths
        run: |
          DOCKERFILE="${{ matrix.image.dockerfile }}"
          if [ -n "${{ inputs.base-path }}" ]; then
            DOCKERFILE="${{ inputs.base-path }}/${DOCKERFILE}"
          fi

          # Validate Dockerfile exists
          if [ ! -f "$DOCKERFILE" ]; then
            echo "❌ Error: Dockerfile not found at: $DOCKERFILE"
            exit 1
          fi

          echo "dockerfile=$DOCKERFILE" >> "$GITEA_OUTPUT"
          echo "✅ Dockerfile found: $DOCKERFILE"

      - name: Run Hadolint
        if: inputs.enable-hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ steps.paths.outputs.dockerfile }}
          failure-threshold: warning
          format: sarif
          output-file: hadolint-results.sarif
          # Hadolint version is specified in the action
          version: ${{ inputs.hadolint-version }}
        continue-on-error: true

      - name: Set up QEMU
        if: contains(inputs.platforms, ',')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: |
          # Generate unique tag using short SHA of dockerfile path
          DOCKERFILE="${{ steps.paths.outputs.dockerfile }}"
          SHORT_SHA=$(echo -n "$DOCKERFILE" | sha256sum | cut -c1-8)
          echo "tag=test-${SHORT_SHA}:latest" >> "$GITEA_OUTPUT"
          echo "tarball=/tmp/image-${SHORT_SHA}.tar" >> "$GITEA_OUTPUT"
          echo "✅ Generated tag: test-${SHORT_SHA}:latest (from $DOCKERFILE)"

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ steps.paths.outputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          load: ${{ !contains(inputs.platforms, ',') }}
          tags: ${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=${{ steps.tag.outputs.tarball }}

      - name: Test image (basic run)
        if: ${{ !inputs.test-build-only && !contains(inputs.platforms, ',') }}
        run: |
          echo "🧪 Testing image startup..."
          # Load image if multi-platform build
          if [ -f "${{ steps.tag.outputs.tarball }}" ]; then
            docker load -i ${{ steps.tag.outputs.tarball }}
          fi

          # Try to run with --version, --help, or just start and stop
          docker run --rm ${{ steps.tag.outputs.tag }} --version || \
          docker run --rm ${{ steps.tag.outputs.tag }} --help || \
          docker run --rm --entrypoint sh ${{ steps.tag.outputs.tag }} -c "echo 'Container started successfully'" || \
          echo "⚠️ Warning: Could not run container, but build succeeded"

      - name: Run Trivy vulnerability scanner
        if: inputs.enable-trivy && !contains(inputs.platforms, ',')
        uses: aquasecurity/trivy-action@0.28.0
        with:
          input: ${{ steps.tag.outputs.tarball }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: ${{ inputs.trivy-severity }}
          # Scan both OS packages and application dependencies
          vuln-type: "os,library"
        continue-on-error: true

      - name: Generate test summary
        if: always()
        run: |
          {
            echo "### 🐳 Docker Test Results: ${{ matrix.image.dockerfile }}"
            echo ""
            echo "**Dockerfile:** \`${{ steps.paths.outputs.dockerfile }}\`"
            echo "**Build Context:** \`${{ inputs.build-context }}\`"
            echo "**Platforms:** \`${{ inputs.platforms }}\`"
            echo ""
            echo "#### Test Steps"

            if [ "${{ inputs.enable-hadolint }}" = "true" ]; then
              if [ "${{ steps.build.outcome }}" = "success" ]; then
                echo "- ✅ Hadolint linting"
              else
                echo "- ⚠️ Hadolint linting (warnings found)"
              fi
            fi

            if [ "${{ steps.build.outcome }}" = "success" ]; then
              echo "- ✅ Docker build"
            else
              echo "- ❌ Docker build"
            fi

            if [ "${{ inputs.enable-trivy }}" = "true" ] && [ ! "${{ contains(inputs.platforms, ',') }}" = "true" ]; then
              echo "- ✅ Trivy security scan"
            fi

          } >> "$GITEA_STEP_SUMMARY"
